<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뭐먹을래? - RETRO EDITION (별아해에이펙스퀴리)</title>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.css');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DungGeunMo', 'Galmuri11', sans-serif !important;
        }
        
        body {
            background-color: #2f2d32; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #2f2d32;
            background-image: radial-gradient(#4910bc 1px, transparent 1px);
            background-size: 16px 16px;
        }
        .container {
            background-color: #fffceb; 
            border: 6px solid #2f2d32;
            box-shadow: 8px 8px 0px #4910bc;
            width: 100%;
            max-width: 430px;
            height: 680px; 
            padding: 40px 24px 24px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 상단 네비게이션 및 로그인 바 */
        .auth-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 10;
        }
        .nav-buttons {
            display: flex;
            gap: 4px;
        }
        .auth-btn {
            width: auto;
            padding: 3px 6px;
            margin-bottom: 0;
            font-size: 0.75rem;
            border: 2px solid #2f2d32;
            box-shadow: 2px 2px 0px #2f2d32;
            background-color: #fff;
        }

        .screen {
            display: none;
            width: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            margin-top: 15px;
        }
        .screen.active {
            display: flex;
        }
        
        /* 첫 화면 타이틀: '뭐먹을래?' 크기는 유지하고 '오늘은' 글씨만 더 작게 축소 */
        h1 {
            font-size: 3.2rem; 
            margin-bottom: 30px;
            color: #4910bc;
            text-shadow: 4px 4px 0px #f7b923; 
            letter-spacing: -1px;
            line-height: 1.1;
        }
        h1 span.today-text {
            display: block;
            font-size: 1.5rem; /* 요구사항: '오늘은' 글씨 크기를 더 작게 수정 */
            color: #4910bc;
            text-shadow: 2px 2px 0px #f7b923;
            letter-spacing: -1px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 35px;
            line-height: 1.5;
            word-break: keep-all;
            color: #2f2d32;
            border-bottom: 4px double #2f2d32;
            padding-bottom: 15px;
            width: 100%;
        }
        button {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 4px solid #2f2d32;
            background-color: #fffceb;
            color: #2f2d32;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px #2f2d32;
            transition: all 0.1s ease;
        }
        button:hover {
            background-color: #f7b923; 
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #2f2d32;
        }
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #2f2d32;
        }
        .start-btn {
            width: 85%;
            font-size: 1.4rem;
            padding: 18px;
            background-color: #ff1fa9; 
            color: #fffceb;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { box-shadow: 4px 4px 0px #2f2d32; }
            50% { box-shadow: 4px 4px 0px #f7b923; }
        }
        
        .food-title {
            font-size: 2.2rem; 
            font-weight: bold;
            color: #ff1fa9;
            margin-top: 20px;
            margin-bottom: 30px; 
            text-shadow: 2px 2px 0px #2f2d32;
        }

        .reason-box {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #2f2d32;
            margin-bottom: 20px;
            padding: 12px;
            background: #fff;
            border: 2px dashed #4910bc;
            word-break: keep-all;
            width: 100%;
        }

        .link-group {
            display: flex;
            gap: 6px;
            width: 100%;
            margin-bottom: 15px;
        }
        
        /* 요구사항: 하단 3개 버튼의 세로폭(padding 상하 값)을 6px로 축소하여 얇게 조정 */
        .map-btn, .blog-btn, .like-btn {
            text-decoration: none;
            color: #fffceb;
            flex: 1;
            padding: 6px 10px; /* 세로 두께를 줄여 슬림하게 변경 */
            border: 4px solid #2f2d32;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 3px 3px 0px #2f2d32;
            text-align: center;
        }
        .map-btn { background-color: #4910bc; }
        .blog-btn { background-color: #03cf5d; color: white; }
        .like-btn { background-color: #ff1fa9; cursor: pointer; } 
        
        .map-btn:hover, .blog-btn:hover, .like-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #2f2d32;
        }

        .ban-section {
            border-top: 4px double #2f2d32;
            padding-top: 12px;
            width: 100%;
        }
        .ban-title {
            font-size: 0.75rem;
            color: #2f2d32;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .ban-options {
            display: flex;
            gap: 6px;
        }
        .ban-options button {
            padding: 6px;
            font-size: 0.8rem;
            background-color: #f7b923;
            margin-bottom: 0;
            box-shadow: 2px 2px 0px #2f2d32;
        }
        .restart-btn {
            background-color: #2f2d32;
            color: #fffceb;
            margin-top: 10px;
            padding: 8px;
            font-size: 0.8rem;
            box-shadow: 2px 2px 0px #4910bc;
        }
        
        .list-container {
            width: 100%;
            height: 400px;
            background: white;
            border: 4px solid #2f2d32;
            padding: 12px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 15px;
        }
        .list-item {
            padding: 8px;
            border-bottom: 2px dashed #ccc;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background-color: #2f2d32;
        }
        .progress {
            height: 100%;
            background-color: #ff1fa9;
            width: 0%;
            transition: width 0.2s linear;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #fffceb;
            padding: 25px;
            border: 5px solid #2f2d32;
            box-shadow: 6px 6px 0px #4910bc;
            text-align: center;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .modal-content input {
            padding: 8px;
            border: 3px solid #2f2d32;
            font-size: 0.9rem;
            outline: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container">
        <div class="progress" id="progressBar"></div>
    </div>

    <div class="auth-bar">
        <div class="nav-buttons">
            <button class="auth-btn" onclick="showHistoryScreen()">선택내역</button>
            <button class="auth-btn" onclick="showLikeScreen()">맛있었어요! 창</button>
        </div>
        <div id="authStatus">
            <button class="auth-btn" onclick="openLoginModal()">로그인</button>
        </div>
    </div>

    <div class="screen active" id="screenStart">
        <h1><span class="today-text">오늘은</span>뭐먹을래?</h1>
        <button class="start-btn" onclick="startQuiz()">게임 시작</button>
    </div>

    <div class="screen" id="screenQuiz">
        <div class="question-text" id="questionText">질문 텍스트</div>
        <div id="answerButtons" style="width: 100%;"></div>
    </div>

    <div class="screen" id="screenResult">
        <div class="food-title" id="foodName">추천 메뉴</div>
        <div class="reason-box" id="foodReason">추천 이유가 여기에 들어갑니다.</div>
        
        <div class="link-group">
            <a href="#" target="_blank" class="map-btn" id="mapLink">가게 찾기</a>
            <a href="#" target="_blank" class="blog-btn" id="blogLink">블로그 보기</a>
            <div class="like-btn" onclick="clickDelicious()">맛있었어요!</div>
        </div>
        
        <div class="ban-section">
            <div class="ban-title">[시스템] 이 메뉴를 당분간 봉인하시겠습니까?</div>
            <div class="ban-options">
                <button onclick="banMenu(1)">1일 봉인</button>
                <button onclick="banMenu(3)">3일 봉인</button>
                <button onclick="banMenu(7)">7일 봉인</button>
            </div>
            <button class="restart-btn" onclick="resetQuiz()">처음부터 다시하기</button>
        </div>
    </div>

    <div class="screen" id="screenHistory">
        <h2 style="margin-bottom:15px; color:#4910bc;">📋 내가 선택했던 메뉴</h2>
        <div class="list-container" id="historyList"></div>
        <button class="restart-btn" onclick="resetQuiz()">메인으로 가기</button>
    </div>

    <div class="screen" id="screenLike">
        <h2 style="margin-bottom:15px; color:#ff1fa9;">⭐ 맛있었어요! 보관함</h2>
        <div class="list-container" id="likeList"></div>
        <button class="restart-btn" onclick="resetQuiz()">메인으로 가기</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">[시스템] 자체 계정 로그인</h3>
        <input type="text" id="userId" placeholder="아이디 입력">
        <input type="password" id="userPw" placeholder="비밀번호 입력">
        <button class="start-btn" style="width:100%; padding:10px; font-size:1rem; margin-bottom:0;" onclick="submitAuth()">확인</button>
        <button class="auth-btn" id="toggleAuthBtn" onclick="toggleAuthMode()">계정이 없으신가요? 회원가입</button>
        <button class="auth-btn" onclick="closeLoginModal()">닫기</button>
    </div>
</div>

<script>
    const questions = [
        { q: "지금 배고픔 상태가 어때?", a: [{ text: "꼬르륵.. 당장 폭식 가능!", scores: { heavy: 2 } }, { text: "적당히 출출해~", scores: {} }, { text: "가볍게 때우고 싶어", scores: { heavy: -2 } }] },
        { q: "오늘 날씨나 기분은 어때?", a: [{ text: "꿀꿀해.. 매콤/자극 필요!", scores: { korean: 1, chinese: 1 } }, { text: "완전 신나! 맛있는 거!", scores: { western: 1, japanese: 1 } }, { text: "평온해~ 늘 먹던 걸로", scores: { korean: 1, japanese: 1 } }] },
        { q: "지금 시간대가 언제야?", a: [{ text: "상쾌한 아침이야!", scores: { heavy: -2, korean: 1, western: 1 } }, { text: "바쁜 낮! 점심이야", scores: { heavy: -1, japanese: 1, korean: 1 } }, { text: "여유로운 저녁~", scores: { heavy: 1, western: 1, chinese: 1 } }, { text: "야식 타이밍 아닌가?", scores: { heavy: 2, chinese: 1, korean: 1 } }] },
        { q: "누구랑 같이 먹어?", a: [{ text: "고독한 미식가 (혼밥)", scores: { japanese: 1, korean: 1 } }, { text: "연인이나 친구랑!", scores: { western: 1, japanese: 1 } }, { text: "가족이나 단체로!", scores: { korean: 1, chinese: 1 } }] },
        { q: "지갑 사정은 좀 어때?", a: [{ text: "Flex 가능! 돈 상관없음", scores: { western: 1, japanese: 1 } }, { text: "평범해~ 가성비 따져야지", scores: { korean: 1, chinese: 1 } }, { text: "텅장이야.. 아껴야 산다", scores: { heavy: -1, korean: 1 } }] },
        { q: "오늘 활동량이 어땠어?", a: [{ text: "침대와 물아일체였음", scores: { heavy: -1 } }, { text: "출근/등교 완료, 평범함", scores: {} }, { text: "땀 뻘뻘! 하얗게 불태웠다", scores: { heavy: 2 } }] }
    ];

    const foodDB = {
        light: {
            korean: [{ name: "잔치국수", reason: "부담 없이 후루룩 넘어가는 깔끔한 멸치 육수의 정석!" }, { name: "본죽", reason: "속을 편안하게 달래주면서 소화도 잘되는 따뜻한 죽을 추천해." }, { name: "콩나물국밥", reason: "시원하고 담백한 국물로 속을 가볍게 채우기 딱 좋아." }, { name: "산채비빔밥", reason: "신선한 나물과 고추장으로 건강하고 가볍게 한 끼 어때?" }, { name: "도토리묵사발", reason: "탱글한 묵과 시원한 육수로 입맛을 돋우는 가벼운 선택이야." }],
            japanese: [{ name: "초밥", reason: "신선하고 깔끔해서 많이 먹어도 속이 무겁지 않은 일식의 정석!" }, { name: "냉모밀", reason: "시원하고 쯔유 국물에 메밀면으로 청량하게 가보자." }, { name: "회덮밥", reason: "신선한 회와 채소로 깔끔하고 든든하지만 가볍게!" }, { name: "오차즈케", reason: "따뜻한 차에 밥을 말아 가볍고 소박하게 즐기는 별미야." }, { name: "우동", reason: "탱글한 면발과 따끈한 국물로 가볍게 배를 채우기 좋지." }],
            western: [{ name: "샐러드 파스타", reason: "아삭한 채소와 새콤한 소스로 입맛을 돋우는 세련된 한 끼!" }, { name: "샌드위치", reason: "신선한 재료들이 조화롭게 어우러져 깔끔하게 먹기 좋아." }, { name: "에그 베네딕트", reason: "브런치 감성 뿜뿜! 부드러운 수란으로 우아하고 가볍게." }, { name: "포케볼", reason: "단백질과 채소를 한 그릇에 담아 건강하고 가볍게 즐겨봐." }, { name: "카프레제 샐러드", reason: "토마토와 치즈의 환상 궁합! 가볍지만 풍미 가득해." }],
            chinese: [{ name: "토마토달걀볶음", reason: "중식이 헤비하다는 편견은 버려! 부드럽고 새콤해서 좋아." }, { name: "기스면", reason: "얇은 면발에 담백한 닭고기 육수로 은은하게 배를 채워봐." }, { name: "딤섬", reason: "한 입 크기로 즐기는 다양한 속재료의 중국식 만두야." }, { name: "해물누룽지탕", reason: "바삭한 누룽지와 부드러운 해물 소스의 조화가 속을 편하게 해." }, { name: "울면", reason: "걸쭉하고 담백한 국물로 자극 없이 즐기는 따뜻한 면 요리야." }]
        },
        heavy: {
            korean: [{ name: "삼겹살", reason: "지친 하루를 보상해 줄 지글지글 육즙 가득한 고기 파티!" }, { name: "감자탕", reason: "깊고 진한 국물에 살코기를 발라 먹으며 제대로 든든하게!" }, { name: "닭볶음탕", reason: "매콤달콤한 양념에 밥까지 슥슥 비벼 먹으면 최고지." }, { name: "부대찌개", reason: "햄과 소시지 가득! 라면 사리까지 추가하면 천국이야." }, { name: "갈비찜", reason: "야들야들한 고기에 짭짤한 양념으로 밥도둑을 경험해봐." }],
            japanese: [{ name: "돈카츠", reason: "바삭한 튀김옷 속에 두툼한 고기가 꽉 찬 겉바속촉의 대명사!" }, { name: "돈코츠 라멘", reason: "사골을 오랜 시간 우려낸 묵직하고 진한 국물 맛이 일품이야." }, { name: "규동", reason: "고소한 우삼겹과 노른자가 어우러진 든든한 덮밥 한 그릇." }, { name: "장어덮밥", reason: "스태미나 끝판왕! 달콤한 양념의 장어로 기력을 보충해." }, { name: "가츠동", reason: "돈까스와 계란의 환상 조합! 배고픔을 한 방에 날려줄게." }],
            western: [{ name: "피자", reason: "쭉쭉 늘어나는 치즈와 풍성한 토핑으로 완벽한 칼로리 충전!" }, { name: "스테이크", reason: "오늘을 특별하게 만들어줄 육즙 가득한 정통 스테이크." }, { name: "수제버거", reason: "두툼한 패티와 다양한 재료가 층층이 쌓인 묵직한 한 끼." }, { name: "라자냐", reason: "치즈와 고기 소스가 겹겹이 쌓여 깊은 풍미를 자랑해." }, { name: "까르보나라 파스타", reason: "꾸덕한 크림 소스로 입안 가득 고소함을 느껴봐." }],
            chinese: [{ name: "짜장면과 탕수육", reason: "달콤짭짤한 짜장면과 바삭한 탕수육은 실패 없는 조합!" }, { name: "마라탕", reason: "얼얼하고 묵직한 중독성 강한 매운맛으로 스트레스 타파!" }, { name: "짬뽕", reason: "얼큰한 국물과 풍성한 해물로 배를 가득 채워줄게." }, { name: "유린기", reason: "바삭한 닭튀김에 새콤한 간장 소스와 고추로 느끼함 잡기!" }, { name: "깐풍기", reason: "매콤하고 짭짤하게 볶아낸 닭고기로 든든하게 가보자." }]
        }
    };

    let currentIdx = 0;
    let userScores = { heavy: 0, korean: 0, chinese: 0, japanese: 0, western: 0 };
    let finalRecommendedMenu = "";
    
    let loggedInUser = localStorage.getItem('activeRetroUser') || null;
    let authMode = "login";

    function openLoginModal() {
        document.getElementById('loginModal').style.display = 'flex';
        authMode = "login";
        document.getElementById('modalTitle').innerText = "[시스템] 자체 계정 로그인";
        document.getElementById('toggleAuthBtn').innerText = "계정이 없으신가요? 회원가입";
    }
    function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }

    function toggleAuthMode() {
        if(authMode === "login") {
            authMode = "register";
            document.getElementById('modalTitle').innerText = "[시스템] 신규 회원가입";
            document.getElementById('toggleAuthBtn').innerText = "이미 계정이 있나요? 로그인하기";
        } else {
            authMode = "login";
            document.getElementById('modalTitle').innerText = "[시스템] 자체 계정 로그인";
            document.getElementById('toggleAuthBtn').innerText = "계정이 없으신가요? 회원가입";
        }
    }

    function submitAuth() {
        const id = document.getElementById('userId').value.trim();
        const pw = document.getElementById('userPw').value.trim();
        if(!id || !pw) { alert("아이디와 비밀번호를 모두 입력하세요."); return; }

        let users = JSON.parse(localStorage.getItem('retroUsersMap') || '{}');

        if(authMode === "register") {
            if(users[id]) { alert("이미 존재하는 아이디입니다."); return; }
            users[id] = pw;
            localStorage.setItem('retroUsersMap', JSON.stringify(users));
            alert("회원가입 완료! 이제 로그인해 주세요.");
            authMode = "login";
            document.getElementById('modalTitle').innerText = "[시스템] 자체 계정 로그인";
            document.getElementById('toggleAuthBtn').innerText = "계정이 없으신가요? 회원가입";
        } else {
            if(users[id] && users[id] === pw) {
                loggedInUser = id;
                localStorage.setItem('activeRetroUser', id);
                alert(`${id}님, 반갑습니다!`);
                closeLoginModal();
                updateAuthUI();
                resetQuiz();
            } else {
                alert("아이디 또는 비밀번호가 올바르지 않습니다.");
            }
        }
    }

    function logout() {
        loggedInUser = null;
        localStorage.removeItem('activeRetroUser');
        updateAuthUI();
        alert("로그아웃 되었습니다.");
        resetQuiz();
    }

    function updateAuthUI() {
        const statusDiv = document.getElementById('authStatus');
        if(loggedInUser) {
            statusDiv.innerHTML = `<span style="color:#4910bc; margin-right:5px;">👾 ${loggedInUser}</span><button class="auth-btn" onclick="logout()">로그아웃</button>`;
        } else {
            statusDiv.innerHTML = `<button class="auth-btn" onclick="openLoginModal()">로그인</button>`;
        }
    }

    function startQuiz() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screenQuiz').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        if (currentIdx >= questions.length) { calculateResult(); return; }
        const percent = (currentIdx / questions.length) * 100;
        document.getElementById('progressBar').style.width = percent + '%';

        const qData = questions[currentIdx];
        document.getElementById('questionText').innerText = qData.q;
        const btnContainer = document.getElementById('answerButtons');
        btnContainer.innerHTML = '';

        qData.a.forEach(answer => {
            const btn = document.createElement('button');
            btn.innerText = answer.text;
            btn.onclick = () => handleAnswer(answer.scores);
            btnContainer.appendChild(btn);
        });
    }

    function handleAnswer(scores) {
        for (let key in scores) { userScores[key] += scores[key]; }
        currentIdx++;
        showQuestion();
    }

    function calculateResult() {
        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('screenQuiz').classList.remove('active');
        document.getElementById('screenResult').classList.add('active');

        const weight = userScores.heavy >= 0 ? 'heavy' : 'light';
        const styles = ['korean', 'chinese', 'japanese', 'western'];
        let maxStyle = 'korean';
        let maxScore = -1;

        styles.forEach(style => {
            if (userScores[style] > maxScore) { maxScore = userScores[style]; maxStyle = style; }
            else if (userScores[style] === maxScore && Math.random() > 0.5) { maxStyle = style; }
        });

        let candidatePool = foodDB[weight][maxStyle];
        const now = new Date().getTime();
        
        const storageKey = loggedInUser ? `bannedMenus_${loggedInUser}` : 'bannedMenus_guest';
        const bannedMenus = JSON.parse(localStorage.getItem(storageKey) || '{}');
        
        let filteredPool = candidatePool.filter(food => !(bannedMenus[food.name] && bannedMenus[food.name] > now));
        if (filteredPool.length === 0) filteredPool = candidatePool;

        const finalFood = filteredPool[Math.floor(Math.random() * filteredPool.length)];
        finalRecommendedMenu = finalFood.name;

        document.getElementById('foodName').innerText = finalFood.name;
        document.getElementById('foodReason').innerText = finalFood.reason;
        
        document.getElementById('mapLink').href = `https://m.map.naver.com/search2/search.naver?query=${encodeURIComponent("내주변 " + finalFood.name)}`;
        document.getElementById('blogLink').href = `https://search.naver.com/search.naver?where=blog&query=${encodeURIComponent(finalFood.name + " 맛집")}`;

        saveToHistory(finalFood.name);
    }

    function saveToHistory(menuName) {
        const key = loggedInUser ? `history_${loggedInUser}` : 'history_guest';
        let history = JSON.parse(localStorage.getItem(key) || '[]');
        const todayStr = new Date().toLocaleDateString();
        history.unshift({ name: menuName, date: todayStr });
        localStorage.setItem(key, JSON.stringify(history));
    }

    function clickDelicious() {
        const key = loggedInUser ? `likes_${loggedInUser}` : 'likes_guest';
        let likes = JSON.parse(localStorage.getItem(key) || '[]');
        if(likes.includes(finalRecommendedMenu)) {
            alert(`이미 '맛있었어요!' 보관함에 추가되어 있는 메뉴입니다.`);
            return;
        }
        likes.push(finalRecommendedMenu);
        localStorage.setItem(key, JSON.stringify(likes));
        alert(`[${finalRecommendedMenu}] 메뉴를 '맛있었어요!' 보관함에 보관했습니다.`);
    }

    function showHistoryScreen() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screenHistory').classList.add('active');
        
        const key = loggedInUser ? `history_${loggedInUser}` : 'history_guest';
        const history = JSON.parse(localStorage.getItem(key) || '[]');
        const container = document.getElementById('historyList');
        container.innerHTML = '';

        if(history.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#aaa;">기록된 내역이 없습니다.</div>';
            return;
        }
        history.forEach(item => {
            container.innerHTML += `<div class="list-item"><span>🍱 ${item.name}</span><span style="color:#aaa; font-size:0.75rem;">${item.date}</span></div>`;
        });
    }

    function showLikeScreen() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screenLike').classList.add('active');
        
        const key = loggedInUser ? `likes_${loggedInUser}` : 'likes_guest';
        const likes = JSON.parse(localStorage.getItem(key) || '[]');
        const container = document.getElementById('likeList');
        container.innerHTML = '';

        if(likes.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#aaa;">보관함이 비어있습니다. 결과창에서 맛있었어요! 커맨드를 클릭해보세요!</div>';
            return;
        }
        likes.forEach(menu => {
            container.innerHTML += `<div class="list-item"><span>💖 ${menu}</span></div>`;
        });
    }

    function banMenu(days) {
        const storageKey = loggedInUser ? `bannedMenus_${loggedInUser}` : 'bannedMenus_guest';
        const bannedMenus = JSON.parse(localStorage.getItem(storageKey) || '{}');
        const expireTime = new Date().getTime() + (days * 24 * 60 * 60 * 1000);
        bannedMenus[finalRecommendedMenu] = expireTime;
        localStorage.setItem(storageKey, JSON.stringify(bannedMenus));
        alert(`[${finalRecommendedMenu}] 메뉴가 향후 ${days}일 동안 추천에서 제외되었습니다!`);
        resetQuiz();
    }

    function resetQuiz() {
        currentIdx = 0;
        userScores = { heavy: 0, korean: 0, chinese: 0, japanese: 0, western: 0 };
        finalRecommendedMenu = "";
        document.getElementById('progressBar').style.width = '0%';
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screenStart').classList.add('active');
    }

    updateAuthUI();
</script>

</body>
</html>
